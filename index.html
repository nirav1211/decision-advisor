<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decision Advisor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --surface-0: #f1f0eb;
      --surface-1: #f8f7f4;
      --surface-2: #ffffff;
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-muted: #9a9890;
      --text-accent: #185fa5;
      --text-success: #3b6d11;
      --text-warning: #854f0b;
      --text-danger: #a32d2d;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.18);
      --border-accent: #85b7eb;
      --bg-accent: #e6f1fb;
      --bg-success: #eaf3de;
      --bg-warning: #faeeda;
      --bg-danger: #fcebeb;
      --fill-accent: #378add;
      --fill-accent-hover: #185fa5;
      --on-accent: #ffffff;
      --radius: 8px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface-0: #1a1a18;
        --surface-1: #232320;
        --surface-2: #2c2c2a;
        --text-primary: #f0ede8;
        --text-secondary: #a8a59f;
        --text-muted: #6b6966;
        --text-accent: #85b7eb;
        --text-success: #97c459;
        --text-warning: #ef9f27;
        --text-danger: #f09595;
        --border: rgba(255,255,255,0.1);
        --border-strong: rgba(255,255,255,0.18);
        --border-accent: #185fa5;
        --bg-accent: #0c447c;
        --bg-success: #27500a;
        --bg-warning: #633806;
        --bg-danger: #791f1f;
        --fill-accent: #378add;
        --fill-accent-hover: #85b7eb;
        --on-accent: #ffffff;
      }
    }

    body {
      font-family: var(--font-sans);
      background: var(--surface-0);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .app {
      max-width: 640px;
      margin: 0 auto;
    }

    .header { margin-bottom: 2rem; }
    .header h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
    .header p { font-size: 14px; color: var(--text-secondary); }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .tab {
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      font-family: var(--font-sans);
      transition: color 0.15s;
    }

    .tab.active { color: var(--text-accent); border-bottom-color: var(--fill-accent); }
    .tab:hover:not(.active) { color: var(--text-primary); }

    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: var(--surface-2);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
      margin-bottom: 6px;
    }

    textarea, input[type="text"], select {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      font-family: var(--font-sans);
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface-1);
      color: var(--text-primary);
      resize: vertical;
      transition: border-color 0.15s;
    }

    textarea:focus, input[type="text"]:focus, select:focus {
      outline: none;
      border-color: var(--fill-accent);
    }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
    .field { margin-bottom: 1rem; }

    .btn {
      padding: 9px 18px;
      font-size: 14px;
      font-weight: 500;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      background: none;
      color: var(--text-primary);
      cursor: pointer;
      font-family: var(--font-sans);
      transition: background 0.15s;
    }

    .btn:hover { background: var(--surface-1); }

    .btn.primary {
      background: var(--fill-accent);
      color: var(--on-accent);
      border-color: var(--fill-accent);
    }

    .btn.primary:hover { background: var(--fill-accent-hover); border-color: var(--fill-accent-hover); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-sm { font-size: 12px; padding: 5px 12px; }

    .btn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .result-box {
      background: var(--bg-accent);
      border: 0.5px solid var(--border-accent);
      border-radius: 12px;
      padding: 1.25rem;
      margin-top: 1rem;
    }

    .result-verdict {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-accent);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .result-reasoning {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.7;
    }

    .result-trend {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 12px;
      padding-top: 12px;
      border-top: 0.5px solid var(--border-accent);
    }

    .result-actions {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 0.5px solid var(--border-accent);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .history-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 0.5px solid var(--border);
    }

    .history-item:last-child { border-bottom: none; }

    .outcome-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .outcome-great { background: var(--bg-success); color: var(--text-success); }
    .outcome-ok    { background: var(--bg-warning); color: var(--text-warning); }
    .outcome-bad   { background: var(--bg-danger);  color: var(--text-danger); }

    .history-title { font-size: 14px; font-weight: 500; color: var(--text-primary); }
    .history-detail { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }
    .history-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: -2px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .insight-box {
      background: var(--surface-1);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .confirmation-msg {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-success);
      display: none;
    }

    .count-badge {
      font-size: 11px;
      background: var(--bg-accent);
      color: var(--text-accent);
      padding: 1px 7px;
      border-radius: 10px;
      margin-left: 4px;
    }

    .error-box {
      background: var(--bg-danger);
      border: 0.5px solid var(--text-danger);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-top: 1rem;
      font-size: 14px;
      color: var(--text-danger);
    }

    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
      .tab { padding: 8px 12px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Your decision advisor</h1>
      <p>Learns from your past choices to help you decide better today.</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('decide')">Decide now</button>
      <button class="tab" onclick="switchTab('log')">Log a past decision</button>
      <button class="tab" onclick="switchTab('history')">History <span class="count-badge" id="history-count">0</span></button>
    </div>

    <!-- DECIDE TAB -->
    <div id="panel-decide" class="panel active">
      <div class="card">
        <div class="field">
          <label>What are you trying to decide?</label>
          <textarea id="decision-q" rows="2" placeholder="e.g. Should I watch a movie or go for a walk tonight?"></textarea>
        </div>
        <div class="row">
          <div>
            <label>Category</label>
            <select id="decision-cat">
              <option value="">Any</option>
              <option value="food">Food / eat</option>
              <option value="entertainment">What to watch</option>
              <option value="productivity">Work / study</option>
              <option value="social">Social / plans</option>
              <option value="lifestyle">Lifestyle / health</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div>
            <label>Your mood right now</label>
            <select id="decision-mood">
              <option value="neutral">Neutral</option>
              <option value="tired">Tired / low energy</option>
              <option value="energized">Energized</option>
              <option value="stressed">Stressed</option>
              <option value="bored">Bored</option>
              <option value="social">Social / outgoing</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Any constraints? (optional)</label>
          <input type="text" id="decision-constraints" placeholder="e.g. only 1 hour free, on a budget, at home..." />
        </div>
        <div class="btn-row">
          <button class="btn primary" id="decide-btn" onclick="getDecision()">Get a recommendation</button>
        </div>
      </div>
      <div id="decision-result"></div>
    </div>

    <!-- LOG TAB -->
    <div id="panel-log" class="panel">
      <div class="card">
        <div class="field">
          <label>What decision did you make?</label>
          <textarea id="log-decision" rows="2" placeholder="e.g. I ordered pizza instead of cooking"></textarea>
        </div>
        <div class="row">
          <div>
            <label>Category</label>
            <select id="log-cat">
              <option value="food">Food / eat</option>
              <option value="entertainment">What to watch</option>
              <option value="productivity">Work / study</option>
              <option value="social">Social / plans</option>
              <option value="lifestyle">Lifestyle / health</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div>
            <label>How did it turn out?</label>
            <select id="log-outcome">
              <option value="great">Great — would do again</option>
              <option value="ok">OK — fine but not ideal</option>
              <option value="bad">Bad — regretted it</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>What did you learn? (optional)</label>
          <input type="text" id="log-notes" placeholder="e.g. I always feel worse after late night food..." />
        </div>
        <div class="btn-row">
          <button class="btn primary" onclick="logDecision()">Save to history</button>
        </div>
        <div class="confirmation-msg" id="log-confirmation">✓ Saved! This will inform future recommendations.</div>
      </div>
    </div>

    <!-- HISTORY TAB -->
    <div id="panel-history" class="panel">
      <div class="insight-box" id="insights-box" style="display:none;" id="insights-text"></div>
      <div id="history-list"></div>
    </div>
  </div>

  <script>
    let history = [];
    try { history = JSON.parse(localStorage.getItem('decision_history') || '[]'); } catch(e) {}

    function saveHistory() {
      try { localStorage.setItem('decision_history', JSON.stringify(history)); } catch(e) {}
    }

    function switchTab(name) {
      ['decide','log','history'].forEach((n, i) => {
        document.querySelectorAll('.tab')[i].classList.toggle('active', n === name);
        document.getElementById('panel-' + n).classList.toggle('active', n === name);
      });
      if (name === 'history') renderHistory();
    }

    function logDecision() {
      const decision = document.getElementById('log-decision').value.trim();
      if (!decision) return;
      history.unshift({
        id: Date.now(),
        decision,
        category: document.getElementById('log-cat').value,
        outcome: document.getElementById('log-outcome').value,
        notes: document.getElementById('log-notes').value.trim(),
        date: new Date().toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
      });
      saveHistory();
      document.getElementById('history-count').textContent = history.length;
      const conf = document.getElementById('log-confirmation');
      conf.style.display = 'block';
      document.getElementById('log-decision').value = '';
      document.getElementById('log-notes').value = '';
      setTimeout(() => { conf.style.display = 'none'; }, 3000);
    }

    function getMostCommonCategory() {
      const counts = {};
      history.forEach(h => { counts[h.category] = (counts[h.category] || 0) + 1; });
      return Object.entries(counts).sort((a,b) => b[1]-a[1])[0]?.[0] || 'general';
    }

    function renderHistory() {
      const list = document.getElementById('history-list');
      const box = document.getElementById('insights-box');
      if (!history.length) {
        list.innerHTML = '<div class="empty-state">No decisions logged yet.<br>Add your first one in "Log a past decision".</div>';
        box.style.display = 'none';
        return;
      }
      if (history.length >= 3) {
        const great = history.filter(h => h.outcome === 'great').length;
        const bad = history.filter(h => h.outcome === 'bad').length;
        box.style.display = 'block';
        box.innerHTML = `<strong style="color:var(--text-primary)">Your patterns:</strong> Out of ${history.length} logged decisions, ${great} turned out great and ${bad} you regretted. Most logged category: <strong style="color:var(--text-primary)">${getMostCommonCategory()}</strong>. The AI uses this to weight its advice.`;
      } else {
        box.style.display = 'none';
      }
      list.innerHTML = history.map(h => `
        <div class="history-item">
          <div style="flex:1; min-width:0;">
            <div class="history-title">${h.decision}</div>
            ${h.notes ? `<div class="history-detail">${h.notes}</div>` : ''}
            <div class="history-meta">${h.date} · ${h.category}</div>
          </div>
          <span class="outcome-badge outcome-${h.outcome}">${h.outcome === 'great' ? 'Great' : h.outcome === 'ok' ? 'OK' : 'Regretted'}</span>
        </div>
      `).join('');
    }

    function buildHistoryContext() {
      if (!history.length) return 'No past decisions logged yet.';
      return history.slice(0, 10).map(h =>
        `- "${h.decision}" (${h.category}) → outcome: ${h.outcome}${h.notes ? '. Notes: ' + h.notes : ''}`
      ).join('\n');
    }

    function escapeAttr(s) {
      return s.replace(/'/g, "\\'").replace(/"/g, '&quot;').substring(0, 80);
    }

    async function getDecision() {
      const question = document.getElementById('decision-q').value.trim();
      if (!question) return;
      const mood = document.getElementById('decision-mood').value;
      const category = document.getElementById('decision-cat').value;
      const constraints = document.getElementById('decision-constraints').value.trim();
      const btn = document.getElementById('decide-btn');
      const resultDiv = document.getElementById('decision-result');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Thinking...';
      resultDiv.innerHTML = '';

      const prompt = `You are a sharp, honest personal decision advisor. You study someone's past decisions and give them one confident, specific recommendation right now — no wishy-washy "it depends".

USER'S PAST DECISIONS:
${buildHistoryContext()}

CURRENT SITUATION:
- Decision needed: ${question}
- Category: ${category || 'general'}
- Current mood: ${mood}
- Constraints: ${constraints || 'none mentioned'}
- Time: ${new Date().toLocaleString('en-IN', { weekday:'long', hour:'numeric', minute:'2-digit', hour12:true })}

Give ONE confident recommendation. Be direct and specific. Reference their past patterns if relevant.

Respond ONLY in this JSON format, no markdown, no preamble:
{
  "verdict": "Your clear recommendation in one sentence",
  "reasoning": "2-3 sentences explaining why, referencing past patterns if available",
  "pattern": "One insight about a pattern from their history, or null if no history yet"
}`;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 1000,
            messages: [{ role: 'user', content: prompt }]
          })
        });
        const data = await res.json();
        const text = (data.content?.find(b => b.type === 'text')?.text || '').replace(/```json|```/g, '').trim();
        const p = JSON.parse(text);
        const cat = category || 'other';
        const qAttr = escapeAttr(question);
        resultDiv.innerHTML = `
          <div class="result-box">
            <div class="result-verdict">→ ${p.verdict}</div>
            <div class="result-reasoning">${p.reasoning}</div>
            ${p.pattern ? `<div class="result-trend">📈 ${p.pattern}</div>` : ''}
            <div class="result-actions">
              <span style="font-size:12px; color:var(--text-muted); align-self:center;">How did it go?</span>
              <button class="btn btn-sm" onclick="quickLog('${qAttr}','${cat}','great')">Great ✓</button>
              <button class="btn btn-sm" onclick="quickLog('${qAttr}','${cat}','ok')">Just OK</button>
              <button class="btn btn-sm" onclick="quickLog('${qAttr}','${cat}','bad')">Regretted it</button>
            </div>
          </div>`;
      } catch(e) {
        resultDiv.innerHTML = `<div class="error-box">Couldn't get a recommendation — check your internet connection and try again.</div>`;
      }
      btn.disabled = false;
      btn.innerHTML = 'Get a recommendation';
    }

    function quickLog(decision, category, outcome) {
      history.unshift({
        id: Date.now(), decision, category, outcome, notes: '',
        date: new Date().toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
      });
      saveHistory();
      document.getElementById('history-count').textContent = history.length;
    }

    document.getElementById('history-count').textContent = history.length;
  </script>
</body>
</html>
